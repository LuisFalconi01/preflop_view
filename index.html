<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>.</title>
    <link rel="icon" type="image/png" href="images/poker_icon.png">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <div class="side secondary">

        <div class="section title-box">
            <div class="title red">3BET - F4B - 5BET</div>
        </div>

        <div class="section">
            <button class="btn" data-images="mp_early_ip.png, mp_early_ip_1.png">MP vs EARLY</button>
            <button class="btn" data-images="co_early_ip.png, co_early_ip_1.png, co_early_ip_2.png">CO vs EARLY</button>
            <button class="btn" data-images="btn_early_ip.png, btn_early_ip_1.png, btn_early_ip_2.png">BTN vs EARLY</button>
            <button class="btn" data-images="btn_co_ip.png, btn_co_ip_1.png, btn_co_ip_2.png">BTN vs CO</button>
        </div>

        <div class="section title-box">
            <div class="title red">SB GAME</div>
        </div>

        <div class="section">
            <button class="btn" data-images="sb_early_oop.png, sb_early_oop_1.png, sb_early_oop_2.png">vs EARLY</button>
            <button class="btn" data-images="sb_co_oop.png, sb_co_oop_1.png, sb_co_oop_2.png">vs CO</button>
            <button class="btn" data-images="sb_btn_oop.png, sb_btn_oop_1.png, sb_btn_oop_2.png">vs BTN</button>
        </div>

        <div class="section title-box">
            <div class="title red">BB GAME</div>
        </div>

        <div class="section">
            <button class="btn" data-image="bb_early_oop.png">vs EARLY</button>
            <button class="btn" data-image="bb_co_oop.png">vs CO</button>
            <button class="btn" data-image="bb_btn_oop.png">vs BTN</button>
            <button class="btn" data-image="bb_sb_oop.png">vs SB</button>
        </div>
        </div>


            <!-- IZQUIERDA -->
    <div class="side">

        <div class="section title-box">
            <div class="title red">IP vs 3BET</div>
        </div>

        <div class="section">
            <button class="btn" data-images="3bet_ep_ip.png, 3bet_ep_ip_1.png, 3bet_ep_ip_2.png, 3bet_ep_ip_3.png, 3bet_ep_ip_4.png">EP - IP</button>
            <button class="btn" data-image="3bet_mp_ip.png">MP - IP</button>
            <button class="btn" data-image="3bet_co_ip.png">CO - IP</button>
            <button class="btn" data-images="3bet_btn_ip.png, 3bet_btn_ip_1.png, 3bet_btn_ip_2.png">BTN - IP</button>
        </div>


        <div class="section title-box">
            <div class="title red">OOP vs 3BET</div>
        </div>

        <div class="section">
            <button class="btn" data-images="3bet_ep_oop.png, 3bet_ep_oop_1.png, 3bet_ep_oop_2.png, 3bet_ep_oop_3.png, 3bet_ep_oop_4.png, 3bet_ep_oop_5.png">EP - OOP</button>
            <button class="btn" data-images="3bet_mp_oop.png, 3bet_mp_oop_1.png, 3bet_mp_oop_2.png, 3bet_mp_oop_3.png, 3bet_mp_oop_4.png">MP - OOP</button>
            <button class="btn" data-images="3bet_co_oop.png, 3bet_co_oop_1.png, 3bet_co_oop_2.png">CO - OOP</button>
            <button class="btn" data-images="3bet_sb_oop.png, 3bet_sb_oop_1.png, 3bet_sb_oop_2.png">SB - OOP</button>
        </div>


    </div>


    <!-- CENTRO -->
    <div class="center-wrapper">

        <div class="center">

            <div class="slider-container">

                <button id="prevSlide" class="slider-btn">
                    ◀
                </button>

                <img
                id="preflopImage"
                src="images/or_ep.png"
                alt="Preflop Range">

                <button id="nextSlide" class="slider-btn">
                    ▶
                </button>

            </div>

        </div>


    </div>




    <!-- DERECHA -->
    <div class="side">

        <div class="section title-box">
            <div class="title red">SQUEEZE BTN/SB</div>
        </div>

        <div class="section">
            <button class="btn" data-images="sqz_btn_early_co.png, sqz_btn_general.png">BTN vs EARLY/CO</button>
            <button class="btn" data-images="sqz_sb_early_co.png, sqz_sb_general.png">SB vs EARLY/CO</button>
            <button class="btn" data-image="sqz_sb_co_btn.png">SB vs CO/BTN</button>
        </div>

        <div class="section title-box">
            <div class="title red">SQUEEZE BB</div>
        </div>

        <div class="section">
            <button class="btn" data-images="sqz_bb_early.png, sqz_bb_general.png">BB vs EARLY</button>
            <button class="btn" data-image="sqz_bb_early_co_btn.png">BB vs EARLY & CO/BTN</button>
            <button class="btn" data-image="sqz_bb_co_btn.png">BB vs CO/BTN</button>

            <button class="btn" data-image="sqz_bb_early_sb.png">BB vs EARLY/SB</button>
            <button class="btn" data-image="sqz_bb_co_sb.png">BB vs CO/SB</button>
            <button class="btn" data-image="sqz_bb_btn_sb.png">BB vs BTN/SB</button>
        </div>

    <div class="section title-box">
            <div class="title red">OTROS</div>
        </div>

        <div class="section">
            <button class="btn" data-image="beats.png">BEATS</button>
            <button class="btn" data-image="stats.png">STATS</button>
        </div>



    </div>

    <!-- DERECHA 2 -->
    <div class="side secondary">

        <div class="section title-box">
            <div class="title red">ROL</div>
        </div>

        <div class="section">
            <button class="btn" data-image="rol_mp.png">MP</button>
            <button class="btn" data-image="rol_co.png">CO</button>
            <button class="btn" data-image="rol_btn.png">BTN</button>
            <button class="btn" data-image="rol_sb.png">SB</button>
            <button class="btn" data-image="rol_bb.png">BB</button>
            <button class="btn" data-image="rol_bb_vs_sb.png">BB vs SB</button>
        </div>

        <div class="section title-box">
            <div class="title red">COLD 4BET</div>
        </div>

        <div class="section">
            <button class="btn" data-image="cold_4bet_ip.png">IP</button>
            <button class="btn" data-image="cold_4bet_oop.png">OOP</button>
        </div>


        <div class="section title-box">
            <div class="title red">PREMISAS</div>
        </div>

        <div class="section">
            <button class="btn" data-image="premisas_preflop.png">PREFLOP</button>
            <button class="btn" data-image="premisas_postflop.png">POSTFLOP</button>
        </div>

    </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
